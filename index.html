<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام مستودع الحاسب الآلي - الكلية التقنية</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background-color: #0b0f19; color: #f8fafc; font-family: 'Segoe UI', Tahoma; }
        .hero-section { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); padding: 25px; border-bottom: 3px solid #38bdf8; margin-bottom: 20px; }
        .card-custom { background: #1e293b; border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .sensor-val { font-size: 1.8rem; font-weight: bold; color: #38bdf8; }
        .stock-badge { background: #0f172a; border: 1px solid #38bdf8; border-radius: 10px; padding: 10px; text-align: center; }
        .stock-num { display: block; font-size: 1.5rem; font-weight: bold; color: #38bdf8; }
        #reader { background: #000; border-radius: 10px; overflow: hidden; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="hero-section text-center">
    <h2>نظام إدارة مستودع الحاسب الآلي (صمام)</h2>
    <div class="names-list mx-auto mt-2" style="max-width: 800px; font-size: 0.8rem; border: 1px solid #38bdf8; padding: 5px; border-radius: 10px;">
        <strong>فريق العمل:</strong> سالم رفق العنزي (قائد) | خالد محمد | عبد الله سعد | طلال شاكر | رعد العويضه والبقية
    </div>
</div>

<div class="container">
    <div class="row g-4">
        <div class="col-md-3">
            <div class="card card-custom p-3 text-center">
                <h5>الرقابة البيئية 📡</h5>
                <hr>
                <div class="mb-3"><small>الحرارة</small><div class="sensor-val"><span id="temp">--</span>°C</div></div>
                <div class="mb-3"><small>الرطوبة</small><div class="sensor-val" style="color: #10b981;"><span id="hum">--</span>%</div></div>
                <hr>
                <small>حالة الدخان</small>
                <div id="fire-status" class="fw-bold text-success">جاري الاتصال...</div>
            </div>
        </div>

        <div class="col-md-9">
            <div class="card card-custom p-4">
                <div class="row">
                    <div class="col-md-5">
                        <h6>ماسح الباركود السريع 📷</h6>
                        <div id="reader"></div>
                        <p class="small text-secondary text-center">وجه الباركود للكاميرا للاختيار التلقائي</p>
                    </div>
                    <div class="col-md-7">
                        <h5>إدارة العمليات</h5>
                        <hr>
                        <div class="row g-3">
                            <div class="col-md-8">
                                <label class="form-label">الصنف المختبر:</label>
                                <select id="itemSelect" class="form-select bg-dark text-white border-secondary">
                                    <option value="شواحن">شواحن لابتوب</option>
                                    <option value="طابعات">طابعات ليزر</option>
                                    <option value="أحبار">أحبار طابعات</option>
                                    <option value="حواسب">أجهزة حاسب (PC)</option>
                                    <option value="فارات">فارات وسماعات</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">الكمية:</label>
                                <input type="number" id="qty" class="form-control bg-dark text-white border-secondary" value="1">
                            </div>
                            <div class="col-12">
                                <input type="text" id="personName" class="form-control bg-dark text-white border-secondary" placeholder="اسم المستلم">
                            </div>
                            <div class="col-12 d-flex gap-2">
                                <button onclick="updateStock('وارد')" class="btn btn-success flex-fill">تسجيل وارد (+)</button>
                                <button onclick="updateStock('منصرف')" class="btn btn-danger flex-fill">تسجيل منصرف (-)</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // 1. إعدادات الفايربيس
    const firebaseConfig = { databaseURL: "https://masro3-65d46-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. تحديث الحساسات تلقائياً
    db.ref("WMS").on("value", (s) => {
        const d = s.val();
        if(d) {
            document.getElementById('temp').innerText = d.Temperature;
            document.getElementById('hum').innerText = d.Humidity;
            document.getElementById('fire-status').innerText = d.Smoke > 2000 ? "⚠️ حريق!" : "سليم ✅";
            document.getElementById('fire-status').className = d.Smoke > 2000 ? "fw-bold text-danger" : "fw-bold text-success";
        }
    });

    // 3. تشغيل ماسح الباركود
    function onScanSuccess(decodedText) {
        // إذا الباركود الممسوح فيه اسم صنف موجود عندنا.. يختاره فوراً
        const items = ["شواحن", "طابعات", "أحبار", "حواسب", "فارات"];
        if(items.includes(decodedText)) {
            document.getElementById('itemSelect').value = decodedText;
            // تنبيه بسيط
            const audio = new Audio('https://www.soundjay.com/buttons/beep-07.mp3');
            audio.play(); 
        }
    }
    let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 200 });
    html5QrcodeScanner.render(onScanSuccess);

    // 4. كود المخزون (نفس شغلك القديم بس مطور)
    let inventory = { "شواحن": 0, "طابعات": 0, "أحبار": 0, "حواسب": 0, "فارات": 0 };
    function updateStock(type) {
        let itemKey = document.getElementById('itemSelect').value;
        let quantity = parseInt(document.getElementById('qty').value) || 1;
        if(type === 'وارد') inventory[itemKey] += quantity;
        else inventory[itemKey] = Math.max(0, inventory[itemKey] - quantity);
        alert(`تم تسجيل ${type}: ${itemKey}`);
    }
</script>
</body>
</html>
