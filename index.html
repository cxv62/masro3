<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام صمام - الكلية التقنية</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background-color: #0b0f19; color: #f8fafc; font-family: 'Segoe UI', Tahoma; }
        .card-custom { background: #1e293b; border: none; border-radius: 15px; }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; background: #000; border: 2px solid #38bdf8; }
        .stock-badge { background: #0f172a; border: 1px solid #38bdf8; border-radius: 10px; padding: 10px; text-align: center; margin-bottom: 10px; }
        .stock-num { display: block; font-size: 1.5rem; font-weight: bold; color: #38bdf8; }
    </style>
</head>
<body>

<div class="container mt-4">
    <h2 class="text-center mb-4">نظام إدارة المستودع الذكي 📦</h2>
    
    <div class="row g-2 mb-4 text-center">
        <div class="col-4"><div class="stock-badge"><small>شواحن</small><span id="count-شواحن" class="stock-num">0</span></div></div>
        <div class="col-4"><div class="stock-badge"><small>طابعات</small><span id="count-طابعات" class="stock-num">0</span></div></div>
        <div class="col-4"><div class="stock-badge"><small>أحبار</small><span id="count-أحبار" class="stock-num">0</span></div></div>
    </div>

    <div class="row g-4">
        <div class="col-md-6">
            <div class="card card-custom p-3">
                <h6 class="text-info">خطوة 1: امسح الباركود 📷</h6>
                <div id="reader"></div>
                <div id="scan-result" class="mt-2 text-center fw-bold text-warning"></div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card card-custom p-3">
                <h6 class="text-info">خطوة 2: تسجيل العملية 📝</h6>
                <hr>
                <label>الصنف المختار:</label>
                <select id="itemSelect" class="form-select bg-dark text-white mb-3">
                    <option value="شواحن">شواحن لابتوب</option>
                    <option value="طابعات">طابعات ليزر</option>
                    <option value="أحبار">أحبار طابعات</option>
                    <option value="حواسب">أجهزة حاسب</option>
                    <option value="فارات">فارات/سماعات</option>
                </select>
                
                <input type="number" id="qty" class="form-control bg-dark text-white mb-3" placeholder="الكمية" value="1">
                <input type="text" id="personName" class="form-control bg-dark text-white mb-3" placeholder="اسم المسؤول">
                
                <div class="d-flex gap-2">
                    <button onclick="updateStock('وارد')" class="btn btn-success w-100">تسجيل وارد (+)</button>
                    <button onclick="updateStock('منصرف')" class="btn btn-danger w-100">تسجيل منصرف (-)</button>
                </div>
            </div>
        </div>
    </div>

    <div class="card card-custom p-3 mt-4">
        <h6>سجل الحركة الحية 📋</h6>
        <table class="table table-dark small">
            <thead><tr><th>العملية</th><th>الصنف</th><th>الكمية</th><th>الوقت</th></tr></thead>
            <tbody id="logs"></tbody>
        </table>
    </div>
</div>

<script>
    // كود المخزون
    let inventory = { "شواحن": 0, "طابعات": 0, "أحبار": 0, "حواسب": 0, "فارات": 0 };

    // تشغيل الماسح
    function onScanSuccess(decodedText) {
        // تنظيف النص الممسوح من أي مسافات
        let cleanText = decodedText.trim();
        
        if (inventory.hasOwnProperty(cleanText)) {
            document.getElementById('itemSelect').value = cleanText;
            document.getElementById('scan-result').innerText = "✅ تم التعرف على: " + cleanText;
            
            // تنبيه صوتي بسيط (اختياري)
            console.log("لقط الباركود: " + cleanText);
        } else {
            document.getElementById('scan-result').innerText = "❌ باركود غير معروف: " + cleanText;
        }
    }

    let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
    html5QrcodeScanner.render(onScanSuccess);

    function updateStock(type) {
        let item = document.getElementById('itemSelect').value;
        let q = parseInt(document.getElementById('qty').value) || 0;
        
        if(type === 'وارد') inventory[item] += q;
        else inventory[item] = Math.max(0, inventory[item] - q);

        document.getElementById(`count-${item}`).innerText = inventory[item];
        
        let row = `<tr><td>${type}</td><td>${item}</td><td>${q}</td><td>${new Date().toLocaleTimeString('ar-SA')}</td></tr>`;
        document.getElementById('logs').innerHTML = row + document.getElementById('logs').innerHTML;
    }
</script>
</body>
</html>
