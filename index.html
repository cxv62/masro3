<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام صمام - التحكم المركزي</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background-color: #0b0f19; color: #f8fafc; font-family: 'Segoe UI', Tahoma; }
        .card-custom { background: #1e293b; border-radius: 15px; border: none; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .sensor-val { font-size: 2.5rem; font-weight: bold; color: #38bdf8; }
        .alert-fixed { display: none; position: fixed; top: 10px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 90%; max-width: 500px; }
        #mute-btn { display: none; background-color: #f59e0b; color: #000; font-weight: bold; width: 100%; padding: 15px; border-radius: 10px; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

<audio id="scan-sound" src="https://www.soundjay.com/buttons/sounds/beep-24.mp3" preload="auto"></audio>
<audio id="alarm-sound" src="https://www.soundjay.com/buttons/sounds/beep-07.mp3" preload="auto"></audio>

<div id="master-alert" class="alert alert-danger alert-fixed text-center shadow-lg blink">
    🚨 <strong>حالة طوارئ!</strong> تم اكتشاف خطر في المستودع
</div>

<div class="container py-5 text-center">
    <h2 class="mb-4 text-info">نظام مستودع صمام الذكي 🏢</h2>
    
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card card-custom p-4">
                <h5 class="mb-3">المراقبة البيئية 📡</h5>
                <div class="mb-3"><small>الحرارة</small><div id="temp" class="sensor-val">--</div></div>
                <div class="mb-3"><small>الرطوبة</small><div id="hum" class="sensor-val" style="color:#10b981;">--</div></div>
                <div class="mb-3"><small>الدخان</small><div id="smoke" class="fw-bold">--</div></div>
                <button id="mute-btn" onclick="muteSystem()" class="btn btn-warning">🔇 إيقاف صوت الإنذار للكل</button>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card card-custom p-4">
                <h5 class="mb-3 text-info">ماسح الباركود 📷</h5>
                <div id="reader" style="border-radius: 10px; overflow: hidden;"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = { databaseURL: "https://mashro3-be2b3-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const alarmAudio = document.getElementById('alarm-sound');
    const scanAudio = document.getElementById('scan-sound');

    // مراقبة الحساسات وتحديث حالة الخطر
    db.ref("WMS").on("value", (snapshot) => {
        const data = snapshot.val();
        if(data) {
            let t = parseFloat(data.Temperature) || 0;
            let h = parseFloat(data.Humidity) || 0;
            let s = parseFloat(data.Smoke) || 0;
            
            document.getElementById('temp').innerText = t + "°C";
            document.getElementById('hum').innerText = h + "%";
            document.getElementById('smoke').innerText = s;

            if (t >= 30 || h >= 65 || s >= 2000) {
                db.ref("System/AlarmTrigger").set("ON");
                document.getElementById('master-alert').style.display = 'block';
            } else {
                db.ref("System/AlarmTrigger").set("OFF");
                db.ref("System/MutedByAdmin").set(false); // إعادة التعيين تلقائياً
                document.getElementById('master-alert').style.display = 'none';
            }
        }
    });

    // التحكم المركزي بالصوت (لجميع المتصفحات والأردوينو)
    db.ref("System").on("value", (snapshot) => {
        const sys = snapshot.val() || {};
        const trigger = sys.AlarmTrigger === "ON";
        const muted = sys.MutedByAdmin || false;

        if (trigger && !muted) {
            alarmAudio.play();
            alarmAudio.loop = true;
            document.getElementById('mute-btn').style.display = 'block';
        } else {
            alarmAudio.pause();
            alarmAudio.currentTime = 0;
            if (!trigger) document.getElementById('mute-btn').style.display = 'none';
        }
    });

    function muteSystem() {
        db.ref("System/MutedByAdmin").set(true); // كتم الصوت في كل مكان
    }

    function onScanSuccess(t) { 
        scanAudio.play(); // صوت "بييب" عند المسح
        alert("تم المسح بنجاح: " + t); 
    }
    
    let scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
    scanner.render(onScanSuccess);
</script>
</body>
</html>
